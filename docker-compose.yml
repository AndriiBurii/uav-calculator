services:
  postgres:
    image: postgres:16-alpine
    container_name: uav_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uav_calculator}
      POSTGRES_USER: ${POSTGRES_USER:-uav_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uav_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-uav_user} -d ${POSTGRES_DB:-uav_calculator}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - uav_network

  redis:
    image: redis:7-alpine
    container_name: uav_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--pass",
          "${REDIS_PASSWORD:-redis_secret}",
          "ping",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - uav_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uav_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: 8080
      POSTGRES_DSN: postgres://${POSTGRES_USER:-uav_user}:${POSTGRES_PASSWORD:-uav_secret}@postgres:5432/${POSTGRES_DB:-uav_calculator}?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      CORS_ORIGINS: http://localhost:5173
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your_access_secret_key_here}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_refresh_secret_key_here}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 720h
    ports:
      - "8080:8080"
    networks:
      - uav_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uav_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:8080
      VITE_APP_ENV: production
    ports:
      - "5173:5173"
    networks:
      - uav_network

volumes:
  postgres_data:
  redis_data:

networks:
  uav_network:
    driver: bridge
